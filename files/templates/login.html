<!DOCTYPE html>
<html>

<head>
    <title>SpendWise — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Main stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ── Auth page: full-height centered flex layout ── -->
    <div class="auth-page">

        <!-- Logo above the card -->
        <div class="auth-logo">
            <div class="logo-icon">💰</div>
            <div class="logo-text">Spend<span class="logo-dot">Wise</span></div>
        </div>

        <!-- ── Login Card ── -->
        <div class="auth-card">
            <div class="auth-title">Welcome back 👋</div>
            <div class="auth-sub">Login to track your expenses</div>

            <!-- POSTs to /login, handled by login() in app.py -->
            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input class="form-input" type="text" name="username" placeholder="Enter your username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input class="form-input" type="password" name="password" placeholder="Enter your password" required>
                </div>

                <!-- Error message shown when login() passes error= to template -->
                {% if error %}
                <div class="auth-error">{{ error }}</div>
                {% endif %}

                <button class="submit-btn" type="submit">Login</button>
            </form>

            <!-- Link to register page -->
            <div class="auth-footer">
                Don't have an account? <a href="/register">Register here</a>
            </div>
        </div>

    </div> <!-- /.auth-page -->

</body>

</html>
