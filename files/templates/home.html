<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
</head>
<body>
    <h1>Welcome to Expense Tracker</h1>
    <h2>Welcome {{ name }}</h2>
    <h3>Add Expenses</h3>
    <form method="POST">
        <label>Title</label>
        <input type="text" name="title">
        <br><br>
        <label>Amount</label>
        <input type="number" name="amount">
        <br><br>
        <label>Category</label>
        <input type="text" name="category">
        <br><br>
        <button type="submit">Add Expenses</button>
    </form>
    <h3>Expenses</h3>
    <ul>
        {% for expense in expenses %}
        <li>
            {{expense[1]}} - ${{ expense[2] }} - {{ expense[3] }} <a href="/delete/{{expense[0]}}">Delete</a>
        </li>
        {% endfor %}
    </ul>

</body>
</html>
